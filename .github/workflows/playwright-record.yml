name: Playwright Tests with Recording

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node (for playwright browsers installer)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Restore and build
        run: dotnet restore && dotnet build --configuration Release

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        shell: bash

      - name: Run tests
        run: dotnet test --configuration Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload recordings artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-recordings
          path: recordings/